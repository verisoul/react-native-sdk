name: Publish to npm

on:
  push:
    tags:
      - "v*"

# Required for npm trusted publishing (OIDC). No NPM_TOKEN is used.
permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # NOTE: do not set registry-url here. setup-node would write an
      # `_authToken=${NODE_AUTH_TOKEN}` line to .npmrc which blocks the OIDC
      # trusted-publishing flow. publishConfig.registry in package.json points
      # npm at the public registry.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Get tag version
        id: get_tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Validate package.json version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.get_tag.outputs.version }}"

          echo "Package version: $PACKAGE_VERSION"
          echo "Tag version: $TAG_VERSION"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Version mismatch!"
            echo "package.json version ($PACKAGE_VERSION) must match tag version ($TAG_VERSION)"
            exit 1
          fi

          echo "Versions match"

      # Trusted publishing requires npm CLI >= 11.5.1
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build library
        run: yarn prepare

      - name: Run tests
        run: yarn test

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn typecheck

      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public

      - name: Publish Summary
        run: |
          echo "============================================"
          echo "Published Successfully!"
          echo "============================================"
          echo ""
          echo "Package: @verisoul_ai/react-native-verisoul"
          echo "Version: ${{ steps.get_tag.outputs.version }}"
          echo ""
          echo "Install with:"
          echo "npm install @verisoul_ai/react-native-verisoul@${{ steps.get_tag.outputs.version }}"
          echo "yarn add @verisoul_ai/react-native-verisoul@${{ steps.get_tag.outputs.version }}"
          echo "============================================"
